name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - build_docs.py
      - .github/workflows/pages.yml
  workflow_dispatch:

# Pages deploys require id-token:write so the deploy action can auth
# back to GitHub, and pages:write to touch the Pages API. contents:read
# is the default but spelled out for clarity.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time, cancel queued runs if a newer one arrives.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build static site
        run: uv run build_docs.py

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
